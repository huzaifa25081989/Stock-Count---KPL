name: Build AuditPro Android APK

"on":
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Create React app from scratch
        run: |
          npx create-react-app auditpro --template cra-template
          cp -r auditpro/. .
          rm -rf auditpro

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Init and sync Capacitor
        run: |
          npx cap init AuditPro com.abcflexpack.auditpro --web-dir build
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        timeout-minutes: 20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AuditPro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
